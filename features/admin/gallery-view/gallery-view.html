<div id="galleryView" class="admin-content">

                            <input type="url" class="form-control" id="galleryImageUrl" placeholder="Optional: https://example.com/media.mp4">
                        </div>

                            <i class="fas fa-save"></i> Add to Gallery
                        </button>

                    <h4 style="margin-top: 30px;"><i class="fas fa-list"></i> Gallery Items</h4>
