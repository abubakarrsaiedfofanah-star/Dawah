<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://www.google.com https://www.google.com/recaptcha/ https://www.google.com/recaptcha/enterprise.js https://www.gstatic.com https://www.gstatic.com/recaptcha/; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co https://firestore.googleapis.com https://firebaseappcheck.googleapis.com https://www.google.com https://www.google.com/recaptcha/; frame-src https://www.google.com https://www.google.com/recaptcha/ https://recaptcha.google.com/recaptcha/; form-action 'self'; upgrade-insecure-requests">
    <script src="canonical_redirect.js?v=20260527-one-link"></script>
    <title>Verify Receipt - UMMA University Da'awah Team</title>
    <link rel="icon" type="image/png" href="assets/umma-university-logo-color.png">
    <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="vendor/fontawesome/css/all.min.css" rel="stylesheet">
    <link href="daawah.css" rel="stylesheet">
</head>
<body class="bg-light">
    <main class="container py-5" style="max-width: 760px;">
        <div class="mb-4">
            <a class="text-decoration-none" href="./"><i class="fas fa-arrow-left"></i> UMMA University Da'awah Team</a>
        </div>
        <section class="bg-white border rounded p-4 shadow-sm">
            <h1 class="h3 mb-3">Receipt Verification</h1>
            <div class="alert alert-info py-2">
                A valid receipt must show as approved in this page. Screenshots or edited receipt numbers should not be accepted without verification here.
            </div>
            <form class="mb-3" id="receiptVerifyForm">
                <label class="form-label" for="receipt">Receipt number</label>
                <div class="input-group">
                    <input class="form-control" id="receipt" name="receipt" autocomplete="off" required>
                    <button class="btn btn-primary" type="submit"><i class="fas fa-shield-alt"></i> Verify</button>
                </div>
            </form>
            <div id="receiptResult" class="mt-3"></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_config.js?v=supabase-ready-20260607"></script>
    <script src="supabase_client.js?v=supabase-ready-20260607"></script>
    <script src="firebase_shared.js"></script>
    <script>
        const input = document.getElementById('receipt');
        const result = document.getElementById('receiptResult');
        const params = new URLSearchParams(location.search);
        input.value = params.get('receipt') || '';

        function escapeText(value) {
            return String(value || '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }[char]));
        }

        function formatAmount(value) {
            return 'KSh ' + Number(value || 0).toLocaleString(undefined, {
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
            });
        }

        function formatDate(value) {
            if (!value) return 'Recorded';
            const date = new Date(value);
            return Number.isNaN(date.getTime()) ? String(value) : date.toLocaleString();
        }

        function renderAuditTrail(item) {
            const entries = Array.isArray(item.auditTrail) ? item.auditTrail : [];
            if (!entries.length) return '';
            return `
                <h2 class="h6 mt-4">Receipt Audit Trail</h2>
                <div class="table-responsive">
                    <table class="table table-sm table-bordered bg-white mb-0">
                        <thead><tr><th>Action</th><th>By</th><th>At</th><th>Note</th></tr></thead>
                        <tbody>
                            ${entries.slice(-8).map(entry => `
                                <tr>
                                    <td>${escapeText(entry.action || 'updated')}</td>
                                    <td>${escapeText(entry.by || 'Finance')}</td>
                                    <td>${escapeText(formatDate(entry.at))}</td>
                                    <td>${escapeText(entry.note || entry.reason || '')}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function verificationCooldown(key, seconds = 4) {
            const last = Number(localStorage.getItem(key) || 0);
            const waitMs = (seconds * 1000) - (Date.now() - last);
            if (waitMs > 0) {
                result.innerHTML = `<div class="alert alert-warning mb-0">Please wait ${Math.ceil(waitMs / 1000)} second(s) before checking again.</div>`;
                return false;
            }
            localStorage.setItem(key, String(Date.now()));
            return true;
        }

        async function verifyReceipt(receiptNumber) {
            if (!receiptNumber) {
                result.innerHTML = '<div class="alert alert-warning mb-0">Enter a receipt number to verify.</div>';
                return;
            }
            if (!verificationCooldown('receiptVerifyCooldown')) return;
            result.innerHTML = '<div class="alert alert-info mb-0">Checking receipt...</div>';
            try {
                const item = await window.DawaahCloud.loadReceiptVerification(receiptNumber);
                if (!item) {
                    result.innerHTML = '<div class="alert alert-danger mb-0">Receipt was not found as an approved receipt. Do not accept it as payment proof.</div>';
                    return;
                }
                if (item.status === 'Reversed') {
                    result.innerHTML = `
                        <div class="alert alert-warning">This receipt exists, but it has been reversed by finance/admin.</div>
                        <table class="table table-bordered bg-white mb-0">
                            <tr><th>Receipt</th><td>${escapeText(item.receiptNumber)}</td></tr>
                            <tr><th>Type</th><td>${escapeText(item.kind || item.type)}</td></tr>
                            <tr><th>Amount</th><td>${formatAmount(item.amount)}</td></tr>
                            <tr><th>Status</th><td>Reversed</td></tr>
                            <tr><th>Updated At</th><td>${escapeText(formatDate(item.updatedAt))}</td></tr>
                        </table>
                        ${renderAuditTrail(item)}
                    `;
                    return;
                }
                if (item.status !== 'Completed') {
                    result.innerHTML = '<div class="alert alert-danger mb-0">Receipt was found, but it is not approved.</div>';
                    return;
                }
                result.innerHTML = `
                    <div class="alert alert-success">Receipt verified in the UMMA University Da'awah Team system.</div>
                    <table class="table table-bordered bg-white mb-0">
                        <tr><th>Receipt</th><td>${escapeText(item.receiptNumber)}</td></tr>
                        <tr><th>Type</th><td>${escapeText(item.kind || item.type)}</td></tr>
                        <tr><th>Name</th><td>${escapeText(item.name || 'Member')}</td></tr>
                        <tr><th>Amount</th><td>${formatAmount(item.amount)}</td></tr>
                        <tr><th>Method</th><td>${escapeText(item.method || 'Not specified')}</td></tr>
                        <tr><th>Transaction Reference</th><td>${escapeText(item.transactionRef || 'Not recorded')}</td></tr>
                        <tr><th>Approved By</th><td>${escapeText(item.approvedBy || 'Treasurer')}</td></tr>
                        <tr><th>Approved At</th><td>${escapeText(formatDate(item.approvedAt))}</td></tr>
                        <tr><th>Last Updated</th><td>${escapeText(formatDate(item.updatedAt))}</td></tr>
                    </table>
                    ${renderAuditTrail(item)}
                `;
            } catch (error) {
                result.innerHTML = `<div class="alert alert-danger mb-0">${escapeText(error.message || 'Could not verify receipt right now.')}</div>`;
            }
        }

        document.getElementById('receiptVerifyForm').addEventListener('submit', event => {
            event.preventDefault();
            const receiptNumber = input.value.trim();
            history.replaceState(null, '', `?receipt=${encodeURIComponent(receiptNumber)}`);
            verifyReceipt(receiptNumber);
        });

        if (input.value) verifyReceipt(input.value.trim());
    </script>
</body>
</html>
