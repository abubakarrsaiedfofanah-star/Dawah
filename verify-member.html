<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'unsafe-inline' https://www.google.com https://www.google.com/recaptcha/ https://www.google.com/recaptcha/enterprise.js https://www.gstatic.com https://www.gstatic.com/recaptcha/; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co https://www.google.com https://www.google.com/recaptcha/; frame-src https://www.google.com https://www.google.com/recaptcha/ https://recaptcha.google.com/recaptcha/; form-action 'self'; upgrade-insecure-requests">
    <script src="canonical_redirect.js?v=20260527-one-link"></script>
    <title>Verify Member - UMMA University Dawah Team</title>
    <link rel="icon" type="image/png" href="assets/umma-university-logo-color.png">
    <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="vendor/fontawesome/css/all.min.css" rel="stylesheet">
    <link href="daawah.css" rel="stylesheet">
</head>
<body class="bg-light">
    <main class="container py-5" style="max-width: 760px;">
        <a class="text-decoration-none" href="./"><i class="fas fa-arrow-left"></i> UMMA University Dawah Team</a>
        <section class="bg-white border rounded p-4 shadow-sm mt-4">
            <h1 class="h3 mb-3">Member Verification</h1>
            <div class="alert alert-info py-2">
                Only paid and active membership cards are valid for official membership use. A registered student record alone is not proof of paid membership.
            </div>
            <form id="memberVerifyForm" class="mb-3">
                <label class="form-label" for="memberId">Card ID, student ID, username, or email</label>
                <div class="input-group">
                    <input class="form-control" id="memberId" required>
                    <button class="btn btn-primary" type="submit"><i class="fas fa-id-card"></i> Verify</button>
                </div>
            </form>
            <div id="memberVerifyResult"></div>
        </section>
    </main>
    <script src="supabase_config.js"></script>
    <script src="supabase_shared.js?v=supabase-ready-20260613-2"></script>
    <script>
        const input = document.getElementById('memberId');
        const result = document.getElementById('memberVerifyResult');
        const params = new URLSearchParams(location.search);
        input.value = params.get('card') || params.get('id') || '';

        function escapeText(value) {
            return String(value || '').replace(/[&<>"']/g, char => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
            }[char]));
        }

        function renderCardResult(card) {
            const isActive = String(card.status || '').toLowerCase() === 'active';
            const isPaid = String(card.paymentStatus || '').toLowerCase() === 'paid';
            const expiresAt = card.expiresAt ? new Date(card.expiresAt) : null;
            const isExpired = expiresAt && !Number.isNaN(expiresAt.getTime()) && expiresAt < new Date();
            const isValid = isActive && isPaid && !isExpired;
            result.innerHTML = `
                <div class="alert ${isValid ? 'alert-success' : 'alert-danger'}">
                    ${isValid ? 'Valid paid membership card.' : 'This card is not valid for use.'}
                </div>
                <table class="table table-bordered bg-white mb-0">
                    <tr><th>Card ID</th><td>${escapeText(card.cardId)}</td></tr>
                    <tr><th>Name</th><td>${escapeText(card.fullName || card.name || card.username)}</td></tr>
                    <tr><th>Student ID</th><td>${escapeText(card.studentId || card.username)}</td></tr>
                    <tr><th>Payment</th><td>${escapeText(card.paymentStatus || 'No payment')}</td></tr>
                    <tr><th>Card Status</th><td>${escapeText(card.status || 'Unknown')}</td></tr>
                    <tr><th>Issued</th><td>${escapeText(card.issuedAt ? new Date(card.issuedAt).toLocaleDateString() : 'Not shown')}</td></tr>
                    <tr><th>Expires</th><td>${escapeText(expiresAt && !Number.isNaN(expiresAt.getTime()) ? expiresAt.toLocaleDateString() : 'Not shown')}</td></tr>
                    <tr><th>Validity</th><td>${escapeText(card.validityYears || '3')} years</td></tr>
                    <tr><th>Receipt</th><td>${escapeText(card.receiptNumber || 'Not shown')}</td></tr>
                    <tr><th>Course</th><td>${escapeText(card.course || 'Not shown')}</td></tr>
                </table>
            `;
        }

        function verificationCooldown(key, seconds = 4) {
            const last = Number(localStorage.getItem(key) || 0);
            const waitMs = (seconds * 1000) - (Date.now() - last);
            if (waitMs > 0) {
                result.innerHTML = `<div class="alert alert-warning mb-0">Please wait ${Math.ceil(waitMs / 1000)} second(s) before checking again.</div>`;
                return false;
            }
            localStorage.setItem(key, String(Date.now()));
            return true;
        }

        async function verifyMember(identifier) {
            if (!identifier) {
                result.innerHTML = '<div class="alert alert-warning mb-0">Enter a member identifier.</div>';
                return;
            }
            if (!verificationCooldown('memberVerifyCooldown')) return;
            result.innerHTML = '<div class="alert alert-info mb-0">Checking member...</div>';
            try {
                if (/^UMMA-CARD-/i.test(identifier)) {
                    const card = await window.SupabaseBackend.loadPublicMembershipCard(identifier);
                    if (!card) {
                        result.innerHTML = '<div class="alert alert-danger mb-0">No issued membership card was found.</div>';
                        return;
                    }
                    renderCardResult(card);
                    return;
                }
                const member = await window.SupabaseBackend.loadPublicMemberVerification(identifier);
                if (!member) {
                    result.innerHTML = '<div class="alert alert-danger mb-0">No approved member record was found.</div>';
                    return;
                }
                result.innerHTML = `
                    <div class="alert alert-warning">Registered student record found. Verify the card ID or receipt number before accepting paid membership.</div>
                    <table class="table table-bordered bg-white mb-0">
                        <tr><th>Name</th><td>${escapeText(member.fullName || member.name || member.username)}</td></tr>
                        <tr><th>Student ID</th><td>${escapeText(member.studentId || member.username)}</td></tr>
                        <tr><th>Role</th><td>${escapeText(member.role || 'student')}</td></tr>
                        <tr><th>Status</th><td>${escapeText(member.status || 'Active')}</td></tr>
                        <tr><th>Course</th><td>${escapeText(member.course || 'Not shown')}</td></tr>
                    </table>
                `;
            } catch (error) {
                result.innerHTML = `<div class="alert alert-danger mb-0">${escapeText(error.message || 'Could not verify member right now.')}</div>`;
            }
        }

        document.getElementById('memberVerifyForm').addEventListener('submit', event => {
            event.preventDefault();
            const identifier = input.value.trim();
            const queryKey = /^UMMA-CARD-/i.test(identifier) ? 'card' : 'id';
            history.replaceState(null, '', `?${queryKey}=${encodeURIComponent(identifier)}`);
            verifyMember(identifier);
        });
        if (input.value) verifyMember(input.value.trim());
    </script>
</body>
</html>
